name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queue.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Compile LaTeX CVs
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            cv_ats_moderno_jpha.tex
            cv_ats_moderno_jpha_en.tex
            cv_ats_moderno_jpha_de.tex
            cv_visual_fiel_jpha.tex
            cv_visual_fiel_jpha_en.tex
            cv_visual_fiel_jpha_de.tex
          working_directory: 'Web/assets/docs/modern/'

      - name: Prepare site directory
        run: |
          # Copy compiled ATS PDFs to their web-serving names
          cp Web/assets/docs/modern/cv_ats_moderno_jpha.pdf Web/assets/docs/modern/cv-jose-pablo-hernandez-alonso-ats.pdf
          cp Web/assets/docs/modern/cv_ats_moderno_jpha_en.pdf Web/assets/docs/modern/cv-jose-pablo-hernandez-alonso-ats-en.pdf
          cp Web/assets/docs/modern/cv_ats_moderno_jpha_de.pdf Web/assets/docs/modern/cv-jose-pablo-hernandez-alonso-ats-de.pdf
          
          # Copy compiled Visual PDFs to their web-serving names
          cp Web/assets/docs/modern/cv_visual_fiel_jpha.pdf Web/assets/docs/cv-jose-pablo-hernandez-alonso.pdf
          cp Web/assets/docs/modern/cv_visual_fiel_jpha_en.pdf Web/assets/docs/cv-jose-pablo-hernandez-alonso-en.pdf
          cp Web/assets/docs/modern/cv_visual_fiel_jpha_de.pdf Web/assets/docs/cv-jose-pablo-hernandez-alonso-de.pdf
          
          mkdir _site
          cp index.html _site/
          cp -r de _site/
          cp -r en _site/
          cp -r Web _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
